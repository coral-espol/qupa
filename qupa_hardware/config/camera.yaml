camera_node:
  ros__parameters:
    # Capture
    image_width:  640
    image_height: 480
    publish_hz:   3.0
    warmup_s:     2.0
    vflip:        true
    jpeg_quality: 80
    publish_raw:  false

    # Ring mask — inner dead zone
    inner_radius_px: 64
    inner_offset_x:  -18
    inner_offset_y:  14

    # Ring mask — outer vision limit
    outer_radius_px: 110
    outer_offset_x:  -18
    outer_offset_y:  14

    # Pole line exclusion masks (pixel coords, pairs define a filled quad)
    pole_line1_p1: [0,   170]
    pole_line1_p2: [220, 210]
    pole_line2_p1: [0,   240]
    pole_line2_p2: [250, 210]
    pole_line3_p1: [640, 150]
    pole_line3_p2: [340, 190]
    pole_line4_p1: [640, 240]
    pole_line4_p2: [340, 210]

    # Detection
    min_area: 50

    # HSV color ranges [H, S, V]
    color_blue_lower:  [100,  80,  60]
    color_blue_upper:  [140, 255, 255]
    color_green_lower: [ 35,  80,  80]
    color_green_upper: [ 85, 255, 255]
    color_red_lower:   [  0, 160, 120]
    color_red_upper:   [  8, 255, 255]

