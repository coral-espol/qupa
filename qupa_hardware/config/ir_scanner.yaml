ir_scanner:
  ros__parameters:
    # I2C addresses
    mux_address: 0x70        # TCA9548A
    sensor_address: 0x40     # GP2Y0E03

    # Sampling
    samples: 3
    settle_s: 0.001
    sample_delay_s: 0.001
    loop_dt: 0.01            # 100 Hz

    # Calibration output clamp [min_cm, max_cm]
    cal_range: [4.0, 50.0]

    # Quadratic calibration per channel: [ch, a, b, c, ...]
    # Channels 1,2,3,5,6,7 — same coefficients as sensor.yaml
    calibration_coeffs: [
       1.0, -0.0006299,  0.5671630,  0.6585924,
       2.0, -0.0009288,  0.6876107, -1.3613167,
       3.0, -0.0016829,  0.7494877, -1.8706732,
       5.0,  0.0002581,  0.5470853,  1.0180294,
       6.0, -0.0019746,  0.7568900, -1.4506072,
       7.0, -0.0009400,  0.6889223, -0.7839605,
    ]
