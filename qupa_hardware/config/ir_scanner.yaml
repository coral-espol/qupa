ir_scanner:
  ros__parameters:
    # I2C addresses
    mux_address: 0x70        # TCA9548A
    sensor_address: 0x40     # GP2Y0E03

    # Sampling
    samples: 3
    settle_s: 0.001
    sample_delay_s: 0.001
    loop_dt: 0.1             # 10 Hz

    # Calibration output clamp [min_cm, max_cm]
    cal_range: [4.0, 50.0]

    # Quadratic calibration [a, b, c] per channel
    cal_ch1: [-0.0006299,  0.5671630,  0.6585924]  # S
    cal_ch2: [-0.0009288,  0.6876107, -1.3613167]  # W
    cal_ch3: [-0.0016829,  0.7494877, -1.8706732]  # NW
    cal_ch4: [ 0.0002581,  0.5470853,  1.0180294]  # N  (coeffs pendientes de calibrar)
    cal_ch5: [-0.0019746,  0.7568900, -1.4506072]  # NE
    cal_ch6: [-0.0009400,  0.6889223, -0.7839605]  # E
